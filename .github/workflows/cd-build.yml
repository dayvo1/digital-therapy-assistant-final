name: Build



on:
  push:
    branches: [ main ]
  workflow_dispatch: 


jobs:

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '21', distribution: 'temurin', cache: 'maven'}

      - name: Make Maven Wrapper Executable
        run: chmod a+x ./mvnw

      - name: Build application
        run: ./mvnw package -B -DskipTests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Start application
        run: |
          ./mvnw spring-boot:run -B &
          echo "waiting for application to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Application started successfully"
              break
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 5
          done
          curl -s http://localhost:8080/actuator/health || (echo "Application failed to start" && exit 1)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Verify OpenAPI docs available
        run: |
          echo "=== Checking OpenAPI docs ==="
          curl -s --fail-with-body http://localhost:8080/v3/api-docs | jq '.info'

      - name: Verify Swagger UI is reachable
        run: |
          echo "=== Checking Swagger UI ==="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" --fail http://localhost:8080/swagger-ui/index.html

  docker-publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [tests, smoke-test]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Scrub hardcoded Anthropic API key from properties
        # application.properties has historically shipped a ${ANTHROPIC_API_KEY:sk-ant-...}
        # fallback that bakes a real key into the jar. Replace any such literal
        # fallback with an empty default so runtime env vars are the only source.
        run: |
          sed -i -E 's|\$\{ANTHROPIC_API_KEY:sk-ant-[^}]*\}|\$\{ANTHROPIC_API_KEY:\}|g' \
            src/main/resources/application.properties

      - name: Fail if any Anthropic key literal remains in sources
        run: |
          if grep -rEn "sk-ant-[A-Za-z0-9_-]+" src/ 2>/dev/null; then
            echo "::error::Anthropic API key literal found in sources — refusing to build image"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GIT_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/commission-calculator" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}

      - name: Verify pushed image contains no Anthropic key
        run: |
          docker pull ${{ steps.img.outputs.name }}:${{ github.sha }}
          CID=$(docker create ${{ steps.img.outputs.name }}:${{ github.sha }})
          docker cp "$CID":/app/app.jar /tmp/app.jar
          docker rm "$CID" > /dev/null
          if unzip -p /tmp/app.jar BOOT-INF/classes/application.properties | grep -E "sk-ant-[A-Za-z0-9_-]+"; then
            echo "::error::Anthropic API key leaked into pushed image"
            exit 1
          fi
          echo "Image verified clean: no sk-ant-* literal in packaged properties"
  

  docker-publish-ui:
    name: Build & Push UI Image
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GIT_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/commission-calculator-ui" >> "$GITHUB_OUTPUT"

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: ./sales-commission-calculator
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}

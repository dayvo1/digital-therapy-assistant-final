
name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Forces older actions to run on Node 24

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with: { java-version: '21', distribution: 'temurin', cache: 'maven' }

      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make Maven Wrapper Executable
        run: chmod a+x ./mvnw

      - name: Compile Java source
        run: ./mvnw --batch-mode compile -DskipTests

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache npm modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React production bundle
        working-directory: frontend
        run: npm run build

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      checks: write
      statuses: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '21', distribution: 'temurin', cache: 'maven' }

      - name: Make Maven Wrapper Executable
        run: chmod a+x ./mvnw
        
      - name: Run all tests
        continue-on-error: true
        run: ./mvnw test -B jacoco:report jacoco:check
        env:
          ANTHROPIC_API_KEY: ${{secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
      - uses: dorny/test-reporter@v1
        if: always()
        with: {name: 'Test Results', path: 'target/surefire-reports/*.xml', reporter: 'java-junit', fail-on-error: 'false' }

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '21', distribution: 'temurin', cache: 'maven' }

      - name: Make Maven Wrapper Executable
        run: chmod a+x ./mvnw
      
      - name: CheckStyle, SpotBugs, and ESLINT
        run: ./mvnw verify -B -DskipTests checkstyle:check spotbugs:check
        env:
          ANTHROPIC_API_KEY: ${{secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
      - uses: codecov/codecov-action@v4
        with: {file: 'target/site/jacoco/jacoco.xml' }

      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Lint
        working-directory: frontend
        run: npm run lint --if-present
      

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: {java-version: '21', distribution: 'temurin', cache: 'maven'}
      - name: Cache NVD database
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-${{ github.run_id }}
          restore-keys: nvd-
      - name: Make Maven Wrapper Executable
        run: chmod a+x ./mvnw
      - run: |
          cat <<EOF > suppressions.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <suppressions xmlns="https://jeremylong.github.io/DependencyCheck/dependency-suppression.1.3.xsd">
          <suppress>
          <notes>False positive: OWASP Dependency-Check incorrectly maps spring-ai to obsolete VMware Server</notes>
          <gav regex="true">^org\.springframework\.ai:spring-ai-starter-mcp-server:.*$</gav>
          <cve>CVE-2009-3732</cve>
          </suppress>
          </suppressions>
          EOF
      - name: Run OWASP Dependency-Check
        run: ./mvnw dependency-check:check -B
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions: {security-events: write}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with: {java-version: '21', distribution: 'temurin', cache: 'maven'}
      - uses: github/codeql-action/init@v4
        with: {languages: 'java'}
      - name: Make Maven Wrapper Executable
        run: chmod a+x ./mvnw
      - name: Compile CodeQL analysis
        run: ./mvnw compile -B -DskipTests
      - uses: github/codeql-action/analyze@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{secrets.ANTHROPIC_API_KEY}}
          AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY}}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}


name: Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'apply'
        type: choice
        options: [apply, destroy]
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [master]

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.9.5'

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      public_ip: ${{ steps.outputs.outputs.public_ip }}
      action: ${{ steps.action.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve action
        id: action
        run: |
          ACTION="${{ github.event.inputs.action }}"
          echo "value=${ACTION:-apply}" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: deploy/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform Apply
        if: steps.action.outputs.value == 'apply'
        working-directory: deploy/terraform
        run: |
          terraform apply -auto-approve \
            -var="key_pair_name=E90" \
            -var="anthropic_api_key=${{ secrets.ANTHROPIC_API_KEY }}"

      - name: Terraform Destroy
        if: steps.action.outputs.value == 'destroy'
        working-directory: deploy/terraform
        run: |
          terraform destroy -auto-approve \
            -var="key_pair_name=E90" \
            -var="anthropic_api_key=${{ secrets.ANTHROPIC_API_KEY }}"

      - name: Capture outputs
        if: steps.action.outputs.value == 'apply'
        id: outputs
        working-directory: deploy/terraform
        run: |
          IP=$(terraform output -raw public_ip)
          echo "public_ip=$IP" >> "$GITHUB_OUTPUT"
          echo "Deployed to http://$IP:8081"

  redeploy:
    name: Pull latest containers on EC2
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ needs.terraform.outputs.action == 'apply' && needs.terraform.outputs.public_ip != '' }}
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/E90.pem
          chmod 600 ~/.ssh/E90.pem

      - name: Wait for SSH
        run: |
          IP="${{ needs.terraform.outputs.public_ip }}"
          for i in $(seq 1 30); do
            if nc -z -w 3 "$IP" 22; then
              echo "SSH port open on $IP"
              ssh-keyscan -H "$IP" >> ~/.ssh/known_hosts 2>/dev/null
              exit 0
            fi
            echo "Waiting for SSH ($i/30)..."
            sleep 10
          done
          echo "SSH never came up"
          exit 1

      - name: Wait for cloud-init to finish
        run: |
          IP="${{ needs.terraform.outputs.public_ip }}"
          for i in $(seq 1 60); do
            STATE=$(ssh -i ~/.ssh/E90.pem -o StrictHostKeyChecking=no -o BatchMode=yes ec2-user@"$IP" \
                'cloud-init status 2>/dev/null | awk "{print \$2}"' || true)
            if [ "$STATE" = "done" ]; then
              echo "cloud-init done"
              exit 0
            fi
            # cloud-init can also report "error" if user_data partially failed
            # (e.g., transient ghcr pull timeout). The redeploy step recovers
            # via docker compose pull, so move on once cloud-init is no longer
            # 'running'.
            if [ "$STATE" = "error" ]; then
              echo "cloud-init reported error — proceeding; redeploy step will recover"
              exit 0
            fi
            echo "Waiting for cloud-init ($i/60, current=$STATE)..."
            sleep 10
          done
          echo "cloud-init never finished — proceeding anyway; redeploy will surface real failures"

      - name: Pull latest images and restart
        run: |
          IP="${{ needs.terraform.outputs.public_ip }}"
          ssh -i ~/.ssh/E90.pem -o StrictHostKeyChecking=no ec2-user@"$IP" 'bash -s' <<'REMOTE'
          set -e
          # Clear any prior failed state from a transient boot-time pull error
          # so future systemctl checks aren't poisoned.
          sudo systemctl reset-failed digitial-therapy-assistant.service 2>/dev/null || true
          cd /opt/digital-therapy-assistant
          sudo docker compose pull
          sudo docker compose up -d
          sudo docker compose ps
          REMOTE

      - name: Verify health
        run: |
          IP="${{ needs.terraform.outputs.public_ip }}"
          for i in $(seq 1 30); do
            if curl -fs --max-time 3 "http://$IP:8081/actuator/health" | grep -q '"status":"UP"'; then
              echo "Backend healthy at http://$IP:8081"
              exit 0
            fi
            echo "Waiting for /actuator/health ($i/30)..."
            sleep 10
          done
          echo "App did not become healthy in time"
          exit 1
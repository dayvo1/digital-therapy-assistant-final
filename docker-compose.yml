services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=
      - JWT_SECRET=
      - SPRING_CONFIG_LOCATION=classpath:/,file:/app/config/
    volumes:
      - db-data:/app/data
      - vector-data:/app/data/vectors
      - ./src/main/resources/application.properties:/app/config/application.properties
    networks:
      - app-network
  frontend:
    build: ./frontend
    ports: 
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
volumes:
  db-data:
  vector-data:
networks:
  app-network:
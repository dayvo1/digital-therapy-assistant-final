version: '3.8'

services:
  # Nginx reverse proxy - serves on port 3000
  nginx:
    image: nginx:alpine
    ports:
      - "3000:3000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
    expose:
      - "3000"
    networks:
      - app-network
    restart: unless-stopped

  # Spring Boot Backend (external service)
  # This assumes the backend is running separately or in another container
  # Uncomment and configure if running backend in the same compose
  # backend:
  #   image: your-backend-image:latest
  #   expose:
  #     - "8080"
  #   environment:
  #     - SPRING_PROFILES_ACTIVE=production
  #   networks:
  #     - app-network
  #   restart: unless-stopped

networks:
  app-network:
    driver: bridge

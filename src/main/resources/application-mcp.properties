# MCP stdio mode overrides - activated with --spring.profiles.active=mcp
# Disables web server so stdio transport can take over
spring.main.web-application-type=none
spring.main.banner-mode=off

# Silence all console output - any text on stdout corrupts MCP protocol JSON
logging.level.root=OFF
logging.level.com.digitaltherapy=OFF
logging.level.org.springframework=OFF
logging.level.org.hibernate.SQL=OFF
logging.level.org.springframework.web.servlet.DispatcherServlet=OFF
logging.level.org.springframework.web.servlet.mvc.method.annotation=OFF
logging.level.org.springframework.ai=OFF
logging.level.org.springframework.ai.anthropic=OFF
logging.level.org.springframework.ai.chat.client=OFF
logging.level.org.springframework.ai.vectorstore=OFF
logging.level.org.springframework.ai.embedding=OFF
logging.level.org.springframework.web.client.RestClient=OFF
logging.level.org.springframework.http.client=OFF

# Redirect any remaining logs to file instead of stdout
logging.file.name=logs/mcp-server.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# MCP Server stdio transport
spring.ai.mcp.server.stdio=true
spring.ai.mcp.server.name=digital-therapy-assistant
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.enabled=true

spring.security.enabled=false
